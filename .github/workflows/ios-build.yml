name: Build iOS TrollStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON: python3

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Loại bỏ cache: 'npm' để tránh vòng lặp "gà và trứng" khi chưa có package-lock.json
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Native Build Tools
        run: npm install -g node-gyp

      - name: Initialize Native iOS & Config Files
        run: |
          mkdir -p temp_init
          cd temp_init
          # Dùng npx --yes để bỏ qua mọi câu hỏi xác nhận từ terminal
          npx --yes react-native@0.73.1 init MeoPhim --version 0.73.1 --skip-install
          cd ..
          
          # 1. Copy khung Native iOS (không ghi đè Podfile chúng ta đã cấu hình)
          # Sử dụng rsync để copy an toàn mà không báo lỗi nếu file đã tồn tại (exit 1 với cp -n)
          rsync -a --ignore-existing temp_init/MeoPhim/ios/ ios/
          mkdir -p ios/MeoPhim
          
          # 2. Bắt buộc: Copy các file cấu hình môi trường để Packager của React có thể chạy
          rsync -a --ignore-existing temp_init/MeoPhim/index.js .
          rsync -a --ignore-existing temp_init/MeoPhim/app.json .
          rsync -a --ignore-existing temp_init/MeoPhim/babel.config.js .
          rsync -a --ignore-existing temp_init/MeoPhim/Gemfile .

      - name: Install Node Modules
        run: npm install --legacy-peer-deps

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          # Fallback 'no-lock' để Action không báo lỗi nếu Podfile.lock chưa từng được sinh ra
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') || 'no-lock' }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        
      - name: Build App Bundle (Unsigned)
        run: |
          set -o pipefail
          xcodebuild -workspace ios/MeoPhim.xcworkspace \
            -scheme MeoPhim \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            clean build | xcpretty

      - name: Package IPA for TrollStore
        run: |
          mkdir -p build/Payload
          cp -R build/Build/Products/Release-iphoneos/*.app build/Payload/
          cd build
          zip -qr MeoPhim_TrollStore_v${{ github.run_number }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeoPhim-Build-v${{ github.run_number }}
          path: build/MeoPhim_TrollStore_v${{ github.run_number }}.ipa
          retention-days: 7
