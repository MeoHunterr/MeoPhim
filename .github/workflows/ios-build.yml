name: Build iOS TrollStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON: python3

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Native Build Tools
        run: npm install -g node-gyp

      - name: Initialize Native iOS Files
        run: |
          mkdir -p temp_init
          cd temp_init
          npx react-native@0.73.1 init MeoPhim --version 0.73.1 --skip-install --install-pods false
          cd ..
          cp -rn temp_init/MeoPhim/ios/* ios/
          mkdir -p ios/MeoPhim

      - name: Generate Package Lock
        run: npm install --package-lock-only --legacy-peer-deps

      - name: Install Node Modules
        run: npm install --legacy-peer-deps

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        
      - name: Build App Bundle (Unsigned)
        run: |
          set -o pipefail
          xcodebuild -workspace ios/MeoPhim.xcworkspace \
            -scheme MeoPhim \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            clean build | xcpretty

      - name: Package IPA for TrollStore
        run: |
          mkdir -p build/Payload
          cp -R build/Build/Products/Release-iphoneos/*.app build/Payload/
          cd build
          zip -qr MeoPhim_TrollStore_v${{ github.run_number }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeoPhim-Build-v${{ github.run_number }}
          path: build/MeoPhim_TrollStore_v${{ github.run_number }}.ipa
          retention-days: 7
