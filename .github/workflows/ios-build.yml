name: Build iOS TrollStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Đảm bảo môi trường build native cho các thư viện như react-native-leveldown
      - name: Install Native Build Tools
        run: |
          brew install node-gyp
          npm config set python python3

      - name: Generate Package Lock
        run: npm install --package-lock-only

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node Modules
        run: npm install --legacy-peer-deps

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        
      - name: Build Archive
        run: |
          xcodebuild -workspace ios/MeoPhim.xcworkspace \
            -scheme MeoPhim \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/MeoPhim.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            archive | xcpretty

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/MeoPhim.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build/output \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Prepare TrollStore IPA (Naming v${{ github.run_number }})
        run: |
          cd build/output
          find . -name "*.ipa" -exec mv {} MeoPhim_TrollStore_v${{ github.run_number }}.ipa \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeoPhim-Build-v${{ github.run_number }}
          path: build/output/MeoPhim_TrollStore_v${{ github.run_number }}.ipa
          retention-days: 7
