name: Build iOS TrollStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Ép các action sử dụng Node.js 24 theo lộ trình 2026 của GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Khắc phục lỗi thiếu package-lock.json để setup-node cache có thể hoạt động
      - name: Generate Package Lock
        run: npm install --package-lock-only

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          # Chỉ định đường dẫn lock file để tránh lỗi nếu repo chưa commit file này
          cache-dependency-path: package-lock.json

      - name: Install Node Modules
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        
      - name: Build Archive
        run: |
          xcodebuild -workspace ios/MeoPhim.xcworkspace \
            -scheme MeoPhim \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/MeoPhim.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            archive | xcpretty

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/MeoPhim.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build/output \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Prepare TrollStore IPA (Rename for uniqueness)
        run: |
          cd build/output
          mv *.ipa MeoPhim-Build-${{ github.run_number }}.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeoPhim-IPA-Build-${{ github.run_number }}
          path: build/output/MeoPhim-Build-${{ github.run_number }}.ipa
          retention-days: 7
