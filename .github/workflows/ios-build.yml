name: Build iOS TrollStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: NPM Install
        run: npm install --legacy-peer-deps

      - name: Bundle JS for iOS
        run: |
          mkdir -p ios/assets
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/assets \
            --reset-cache

      - name: Fix Boost Source & Checksum
        run: |
          cd node_modules/react-native/third-party-podspecs
          # Sử dụng link mirror cực kỳ ổn định từ GitHub
          sed -i.bak -e 's|https://boostorg.jfrog.io/artifactory/main/release/1.83.0/source/boost_1_83_0.tar.bz2|https://github.com/react-native-community/boost-for-react-native/releases/download/v1.83.0-0/boost_1_83_0.tar.bz2|g' boost.podspec
          # Cập nhật SHA256 tương ứng
          sed -i.bak -e 's/6478edfe2f3305127cffe8caf73ea0176c53769f4bf1585be237eb30798c3b8e/1c162b579a423fa6876c6c5bc16d39ab4bc05e28898977a0a6af345f523f6357/g' boost.podspec

      - name: Rename Xcode Targets (MeoTemp -> MeoPhim)
        run: |
          cd ios
          # Thay thế toàn bộ chữ MeoTemp thành MeoPhim bên trong file cấu hình lõi
          sed -i.bak 's/MeoTemp/MeoPhim/g' MeoPhim.xcodeproj/project.pbxproj
          
          # Đổi tên file Scheme (nếu có)
          mkdir -p MeoPhim.xcodeproj/xcshareddata/xcschemes/
          if [ -f "MeoPhim.xcodeproj/xcshareddata/xcschemes/MeoTemp.xcscheme" ]; then
            mv MeoPhim.xcodeproj/xcshareddata/xcschemes/MeoTemp.xcscheme MeoPhim.xcodeproj/xcshareddata/xcschemes/MeoPhim.xcscheme
            sed -i.bak 's/MeoTemp/MeoPhim/g' MeoPhim.xcodeproj/xcshareddata/xcschemes/MeoPhim.xcscheme
          fi

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build App (Unsigned)
        run: |
          xcodebuild -workspace ios/MeoPhim.xcworkspace \
            -scheme MeoPhim \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build | xcpretty

      - name: Package IPA for TrollStore
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          # Đảm bảo main.jsbundle có mặt trong payload
          if [ ! -f "$APP_PATH/main.jsbundle" ]; then
            cp ios/main.jsbundle "$APP_PATH/"
          fi
          
          mkdir -p build/Payload
          xcrun ditto "$APP_PATH" "build/Payload/$(basename "$APP_PATH")"
          cd build
          zip -qr MeoPhim_TrollStore_v${{ github.run_number }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeoPhim-Build-v${{ github.run_number }}
          path: build/*.ipa
          retention-days: 7
