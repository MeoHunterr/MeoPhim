name: Build iOS TrollStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON: python3

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Loại bỏ cache: 'npm' để tránh vòng lặp "gà và trứng" khi chưa có package-lock.json
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Native Build Tools
        run: npm install -g node-gyp

      - name: Initialize Native iOS & Config Files
        run: |
          mkdir -p temp_init
          cd temp_init
          # Dùng npx --yes để bỏ qua mọi câu hỏi xác nhận từ terminal
          npx --yes react-native@0.73.1 init MeoPhim --version 0.73.1 --skip-install
          cd ..
          
          # 1. Copy khung Native iOS (không ghi đè Podfile chúng ta đã cấu hình)
          rsync -a --ignore-existing temp_init/MeoPhim/ios/ ios/
          mkdir -p ios/MeoPhim
          
          # 2. Xóa các file rsync ở đây vì đã tạo thủ công trong repo

      - name: Install Node Modules
        run: npm install --legacy-peer-deps

      - name: Nodeify Node Modules
        run: npx rn-nodeify --install --hack

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          # Fallback 'no-lock' để Action không báo lỗi nếu Podfile.lock chưa từng được sinh ra
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') || 'no-lock' }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Fix Boost Checksum & Install CocoaPods
        run: |
          # URL gốc của JFrog đang bị sập/trả về file lỗi HTML.
          # Thay thế URL tải Boost bằng bản backup tĩnh trên archives.boost.io để khắc phục lỗi "Unrecognized archive format"
          sed -i '' 's|https://boostorg.jfrog.io/artifactory/main/release/1.83.0/source/boost_1_83_0.tar.bz2|https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.bz2|g' node_modules/react-native/third-party-podspecs/boost.podspec
          
          cd ios
          pod cache clean boost --all
          pod install --repo-update

      - name: Bundle JS for iOS
        run: |
          mkdir -p ios/assets
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/assets

      - name: Configure Xcode Build Settings
        run: |
          ruby -e "
          require 'xcodeproj'
          project_path = 'ios/MeoPhim.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          project.targets.each do |target|
            if target.name == 'MeoPhim'
              target.build_configurations.each do |config|
                config.build_settings['ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES'] = 'YES'
                config.build_settings['DEAD_CODE_STRIPPING'] = 'NO'
                config.build_settings['STRIP_INSTALLED_PRODUCT'] = 'NO'
              end
            end
          end
          project.save
          "

      - name: Build App Bundle (Unsigned)
        run: |
          set -o pipefail
          xcodebuild -workspace ios/MeoPhim.xcworkspace \
            -scheme MeoPhim \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            GENERATE_INFOPLIST_FILE=YES \
            CODE_SIGN_ENTITLEMENTS=ios/MeoPhim.entitlements \
            clean build | xcpretty

      - name: Package IPA for TrollStore
        run: |
          # Đảm bảo main.jsbundle được copy vào bundle app nếu Xcode build bỏ qua
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          if [ ! -f "$APP_PATH/main.jsbundle" ]; then
            echo "Manually copying main.jsbundle to $APP_PATH"
            cp ios/main.jsbundle "$APP_PATH/"
          fi
          
          # Copy assets nếu cần
          if [ -d "ios/assets" ]; then
            cp -R ios/assets/* "$APP_PATH/" || true
          fi

          mkdir -p build/Payload
          
          # Thay cp -R bằng xcrun ditto để giữ nguyên cấu trúc Frameworks và symlinks
          xcrun ditto "$APP_PATH" "build/Payload/$(basename "$APP_PATH")"
          
          cd build
          zip -qr MeoPhim_TrollStore_v${{ github.run_number }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeoPhim-Build-v${{ github.run_number }}
          path: build/MeoPhim_TrollStore_v${{ github.run_number }}.ipa
          retention-days: 7
